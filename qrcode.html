<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraStock - QR Code</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .qr-container {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        .url {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
            word-break: break-all;
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
        }
        .info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AstraStock</h1>
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
        <div class="url">
            https://astrastock-windsurf-nxdo9okru-trinidadia-sys-projects.vercel.app
        </div>
        <div class="info">
            <strong>📱 Scan this QR code with your phone camera</strong><br>
            Opens AstraStock AI-powered stock market intelligence app<br>
            <strong>Features:</strong> Real-time predictions, watchlist, AI insights
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // Generate QR code for the AstraStock app
        new QRCode(document.getElementById("qrcode"), {
            text: "https://astrastock-windsurf-nxdo9okru-trinidadia-sys-projects.vercel.app",
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
